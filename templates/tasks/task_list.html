<!DOCTYPE html>
<html>
<head><title>My Tasks</title></head>
<body>
  <h1>Tasks</h1>
  <a href="{% url 'task-create' %}">+ New Task</a>
  <table border="1">
    <tr><th>Title</th><th>Status</th><th>Priority</th><th>Due</th><th>Actions</th></tr>
    {% for task in tasks %}
    <tr>
      <td>{{ task.title }}</td>
      <td>{{ task.get_status_display }}</td>
      <td>{{ task.get_priority_display }}</td>
      <td>{{ task.due_date }}</td>
      <td>
        <a href="{% url 'task-update' task.pk %}">Edit</a>
        <a href="{% url 'task-delete' task.pk %}">Delete</a>
      </td>
    </tr>
    {% empty %}
      <tr><td colspan="5">No tasks yet.</td></tr>
    {% endfor %}
  </table>
</body>
</html>
