<!DOCTYPE html>
<html>
<head><title>Task Form</title></head>
<body>
  <h1>{% if object %}Edit{% else %}New{% endif %} Task</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
  <a href="{% url 'task-list' %}">Back</a>
</body>
</html>
